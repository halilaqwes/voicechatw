<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Login Screen -->
    <div id="login-screen" class="screen">
        <div class="login-box">
            <h1>Özel Sesli Sohbet</h1>
            <p>Lütfen size verilen özel şifreyi giriniz.</p>
            <div class="input-group">
                <input type="password" id="password-input" placeholder="Şifreniz" autocomplete="off">
            </div>
            <p id="login-error" class="error-text" style="display: none;">Hatalı şifre. Lütfen tekrar deneyin.</p>
            <button id="login-btn">Giriş Yap</button>
        </div>
    </div>

    <!-- Main Chat Screen -->
    <div id="chat-screen" class="screen main-layout" style="display: none;">
        <!-- Left Sidebar -->
        <div class="sidebar">
            <h2 class="sidebar-title">KANALLAR</h2>
            <div class="channel active" id="nav-chat">
                <span class="hashtag">#</span> Genel Sohbet
            </div>
            <div class="channel" id="nav-game">
                <span class="hashtag">🎮</span> Mini Oyunlar
            </div>
        </div>

        <!-- Main Content -->
        <div class="content" style="position: relative;">
            
            <!-- CHAT VIEW -->
            <div id="view-chat" style="display:flex; flex-direction:column; flex:1;">
                <div class="header">
                    <h3>Genel Sohbet</h3>
                </div>
                <div class="participants-area" id="participants-container">
                    <!-- Participants will be dynamically added here -->
                </div>
            </div>

            <!-- GAME VIEW -->
            <div id="view-game" style="display:none; flex-direction:row; flex:1; overflow:hidden;">
                <div style="flex:1; display:flex; flex-direction:column; align-items:center; position:relative; background-color: var(--bg-primary);">
                    <div class="header" style="width: 100%; display:flex; justify-content:space-between; align-items:center;">
                        <h3 id="game-title" style="padding-left:16px;">Mini Oyunlar - 🏀 Basketbol</h3>
                        <select id="game-selector" style="margin-right:16px; background:var(--bg-tertiary); color:white; border:none; padding:6px 12px; border-radius:6px; cursor:pointer;">
                            <option value="basketball">🏀 Basketbol</option>
                            <option value="flappy">💩 Mahonun Göt Deliği</option>
                        </select>
                    </div>
                    <canvas id="basketball-canvas" width="400" height="400" style="background:#2b2d31; margin-top:20px; border-radius:8px; border:2px solid #1e1f22; cursor:pointer; touch-action: manipulation;"></canvas>
                    <div id="game-ui" style="position:absolute; top:80px; color:white; pointer-events:none; text-align:center;">
                        <h2 id="game-score">Skor: 0</h2>
                        <h3 id="game-time">Süre: 60s</h3>
                    </div>
                    <button id="start-game-btn" class="control-btn" style="width:200px; padding:12px; margin-top:15px; background:var(--green); color:white; border-radius:4px; border:none; cursor:pointer;">Oyunu Başlat</button>
                    <p style="color:var(--text-muted); font-size:12px; margin-top:10px;">Topu fırlatmak için tıkayın!</p>
                </div>
                <!-- LEADERBOARD -->
                <div style="width:220px; background:var(--bg-secondary); border-left:1px solid var(--bg-tertiary); display:flex; flex-direction:column;">
                    <div class="chat-header">👑 Liderlik Tablosu</div>
                    <div id="leaderboard-list" style="padding:16px; color:white; display:flex; flex-direction:column; gap:10px; overflow-y:auto;">
                        <!-- Scores will be injected -->
                    </div>
                </div>
            </div>

            <!-- Controls (Bottom) -->
            <div class="controls-bar">
                <div class="current-user-info">
                    <div class="avatar" id="my-avatar">X</div>
                    <div class="details">
                        <div class="name" id="my-name">Kullanıcı</div>
                        <div class="status">Bağlı</div>
                    </div>
                </div>
                <div class="buttons">
                    <button id="cam-btn" class="control-btn" title="Kamerayı Aç/Kapat">
                        <!-- Camera Icon -->
                        <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M15 8v8H5V8h10m1-2H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4V7c0-.55-.45-1-1-1z"></path></svg>
                    </button>
                    <button id="mute-btn" class="control-btn" title="Mikrofonu Kapat">
                        <!-- Mute Icon -->
                        <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M12 2C9.79 2 8 3.79 8 6V10C8 12.21 9.79 14 12 14C14.21 14 16 12.21 16 10V6C16 3.79 14.21 2 12 2ZM19 10C19 13.53 16.39 16.44 13 16.93V20H11V16.93C7.61 16.44 5 13.53 5 10H7C7 12.76 9.24 15 12 15C14.76 15 17 12.76 17 10H19Z"></path></svg>
                    </button>
                    <button id="deafen-btn" class="control-btn" title="Sağırlaştır">
                        <!-- Headphone Icon -->
                        <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M12 2C6.48 2 2 6.48 2 12V19.5C2 20.88 3.12 22 4.5 22H7V14H4V12C4 7.58 7.58 4 12 4C16.42 4 20 7.58 20 12V14H17V22H19.5C20.88 22 22 20.88 22 19.5V12C22 6.48 17.52 2 12 2Z"></path></svg>
                    </button>
                    <!-- Logout spacer -->
                    <div style="width: 1px; height: 24px; background-color: #4f545c; margin: 0 4px;"></div>
                    <button id="logout-btn" class="control-btn" title="Çıkış Yap" style="color: #da373c;">
                        <!-- Exit/Logout Icon -->
                        <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"></path></svg>
                    </button>
                </div>
            </div>
        </div>
        
        <!-- Text Chat Sidebar -->
        <div class="chat-sidebar" id="chat-sidebar">
            <div class="chat-header">Yazılı Sohbet</div>
            <div class="chat-messages" id="chat-messages"></div>
            <div class="chat-input-area">
                <input type="text" id="chat-input" placeholder="Mesaj yazın ve Enter'a basın..." autocomplete="off" />
            </div>
        </div>

    </div>

    <!-- Hidden audio elements container -->
    <div id="audio-container" style="display: none;"></div>

    <!-- Scripts -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="auth.js"></script>
    <script src="voice.js"></script>
    <script src="game.js"></script>
    <script src="app.js"></script>
</body>
</html>
